<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refine Your Experience | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        body.review-edit-page {
            background: radial-gradient(circle at top right, #fdf4f7, var(--lumiere-bg));
            display: flex;
            align-items: center;
        }

        .edit-container { width: 100%; max-width: 550px; margin: auto; padding: 20px; }

        .lumiere-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(217, 165, 179, 0.2); border-radius: 2.5rem;
            box-shadow: 0 2rem 5rem rgba(173, 127, 141, 0.12); padding: 3.5rem 3rem;
            position: relative; overflow: hidden;
        }

        .lumiere-card::before {
            content: 'L'; position: absolute; top: -20px; right: -10px;
            font-family: 'Playfair Display', serif; font-size: 10rem;
            color: var(--lumiere-soft); opacity: 0.4; z-index: -1;
        }

        .context-box {
            background-color: var(--lumiere-soft); border-radius: 1.2rem;
            padding: 1.2rem; margin-bottom: 2.5rem; border-left: 4px solid var(--lumiere-pink);
        }

        .btn-update {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: white; border: none; border-radius: 50px; padding: 1rem 2rem;
            font-weight: 700; width: 100%; margin-top: 1.5rem;
            box-shadow: 0 10px 20px rgba(217, 165, 179, 0.3); transition: all 0.3s ease;
        }

        .btn-update:hover {
            transform: translateY(-3px); box-shadow: 0 15px 30px rgba(217, 165, 179, 0.4);
            filter: brightness(1.05); color: white;
        }

        .back-link {
            color: #ad8b97; text-decoration: none; font-size: 0.85rem;
            font-weight: 500; transition: color 0.3s ease;
        }

        .back-link:hover { color: var(--lumiere-dark); }
    </style>
</head>
<body class="review-edit-page"> <div class="edit-container">
        <div class="lumiere-card">
            
            <div class="text-center mb-4">
                <div class="d-inline-block p-3 rounded-4 mb-3" style="background: var(--lumiere-soft); color: var(--lumiere-pink);">
                    <i class="bi bi-pencil-square fs-3"></i>
                </div>
                <h2 style="letter-spacing: -1px;">Refine Your Review</h2>
                <p class="text-muted small">Update your feedback to help us keep Lumière glowing.</p>
            </div>

            <div class="context-box d-flex align-items-center">
                <div class="me-3">
                    <i class="bi bi-stars fs-4" style="color: var(--lumiere-pink);"></i>
                </div>
                <div>
                    <div class="small fw-bold text-uppercase opacity-50" style="font-size: 0.6rem;">Editing review for</div>
                    <div class="fw-bold" th:text="${review.serviceName}">Bespoke Hair Styling</div>
                    <div class="small text-muted" th:text="'Stylist: ' + ${review.stylistName}">Stylist: Kasun</div>
                </div>
            </div>

            <form th:action="@{/updateReview}" method="post">
                <input type="hidden" name="reviewId" th:value="${review.reviewId}">

                <div class="mb-4">
                    <label class="form-label text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 1.5px; color: #ad8b97;">Overall Rating</label>
                    <select name="rating" class="form-select">
                        <option value="5" th:selected="${review.rating == 5}">⭐⭐⭐⭐⭐ - Exceptional</option>
                        <option value="4" th:selected="${review.rating == 4}">⭐⭐⭐⭐ - Very Good</option>
                        <option value="3" th:selected="${review.rating == 3}">⭐⭐⭐ - Satisfactory</option>
                        <option value="2" th:selected="${review.rating == 2}">⭐⭐ - Needs Work</option>
                        <option value="1" th:selected="${review.rating == 1}">⭐ - Disappointing</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label text-uppercase fw-bold" style="font-size: 0.75rem; letter-spacing: 1.5px; color: #ad8b97;">Your Experience</label>
                    <textarea name="comment" class="form-control" rows="5" 
                              placeholder="Share the details of your visit..." 
                              th:text="${review.comment}"></textarea>
                </div>

                <button type="submit" class="btn btn-update">
                    SAVE UPDATED REVIEW <i class="bi bi-check2-circle ms-2"></i>
                </button>

                <div class="text-center mt-4">
                    <a href="/my-portal" class="back-link">
                        <i class="bi bi-arrow-left me-1"></i> Discard changes and return
                    </a>
                </div>
            </form>

        </div>
        
        <div class="text-center mt-4 opacity-50 small" style="color: #5f4a55;">
            &copy; 2026 Lumière Salon | Client Data Integrity Protocol
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
