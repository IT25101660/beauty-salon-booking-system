<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Review</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="site-header" aria-label="Salon dashboard header">
    <div class="inner">
        <div>
            <div class="topbar__title">Beauty Salon Reviews</div>
            <div class="topbar__subtitle"></div>
        </div>
        <nav aria-label="Primary">
            <a class="btn btn--secondary" href="/">Create</a>
            <a class="btn btn--primary" href="/reviews">Reviews</a>
            <a class="btn" href="/admin/reviews">Admin</a>
        </nav>
    </div>
</header>

<main class="page-wrapper" aria-label="Edit review page">
    <div class="container">
        <h2 class="title">Edit Review</h2>
        <p class="subtitle">Update the rating and comment while keeping the original customer and service details.</p>

        <form th:action="${formAction}" method="post">
            <input type="hidden" name="reviewId" th:value="${review.reviewId}">
            <input type="hidden" name="token" th:value="${token}">

            <div class="edit-summary" aria-label="Review details">
                <p class="edit-summary__row">
                    <span class="edit-summary__label">Customer</span>
                    <span class="edit-summary__value" th:text="${review.customerName}"></span>
                </p>
                <p class="edit-summary__row">
                    <span class="edit-summary__label">Service</span>
                    <span class="edit-summary__value" th:text="${review.serviceName}"></span>
                </p>
                <p class="edit-summary__row">
                    <span class="edit-summary__label">Stylist</span>
                    <span class="edit-summary__value" th:text="${review.stylistName}"></span>
                </p>
            </div>

            <label for="edit-rating">Rating</label>
            <input id="edit-rating" type="number" name="rating" th:value="${review.rating}">

            <label for="edit-comment">Comment</label>
            <textarea id="edit-comment" name="comment" rows="4" th:text="${review.comment}"></textarea>

            <button class="submit-btn" type="submit">Update</button>
        </form>

        <!-- Customer delete (requires token) -->
        <a class="view-link delete-link"
           th:if="${token != null and !#strings.isEmpty(token)}"
           th:href="@{/deleteReview(id=${review.reviewId}, token=${token})}"
           onclick="return confirm('Delete your review permanently?');">
            Delete my review
        </a>

        <!-- Admin delete (no token) -->
        <a class="view-link delete-link"
           th:if="${token == null or #strings.isEmpty(token)}"
           th:href="@{/admin/deleteReview(id=${review.reviewId})}"
           onclick="return confirm('Delete this review as admin?');">
            Delete (admin)
        </a>

        <a class="view-link" href="/reviews">Back</a>
    </div>
</main>
</body>
</html>
