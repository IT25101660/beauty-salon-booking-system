<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Review Control</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="site-header" aria-label="Salon dashboard header">
    <div class="inner">
        <div>
            <div class="topbar__title">Beauty Salon Reviews</div>
            <div class="topbar__subtitle">Admin control</div>
        </div>
        <nav aria-label="Primary">
            <a class="btn btn--secondary" href="/">Create</a>
            <a class="btn" href="/reviews">Customer View</a>
            <a class="btn btn--primary" href="/admin/reviews">Admin</a>
        </nav>
    </div>
</header>

<main class="page-wrapper page-wrapper--list" aria-label="Admin review control page">
    <div class="container container--list">
        <h2 class="title">Admin Review Control</h2>
        <p class="subtitle">Review moderation (delete inappropriate or outdated reviews)</p>

        <form class="filter-form" action="/admin/reviews" method="get" aria-label="Filter reviews">
            <div class="filter-grid">
                <div>
                    <label for="service-filter">Service</label>
                    <input id="service-filter" type="text" name="service" placeholder="e.g., Facial" th:value="${service}">
                </div>
                <div>
                    <label for="stylist-filter">Stylist</label>
                    <input id="stylist-filter" type="text" name="stylist" placeholder="e.g., Sahan" th:value="${stylist}">
                </div>
            </div>
            <button class="submit-btn submit-btn--compact" type="submit">Filter</button>
        </form>

        <div class="table-responsive">
            <table class="review-table">
                <thead>
                <tr>
                    <th>Review ID</th>
                    <th>Admin Label</th>
                    <th>Type</th>
                    <th>Customer</th>
                    <th>Service</th>
                    <th>Stylist</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="review : ${reviews}">
                    <td th:text="${review.reviewId}"></td>
                    <td><span class="badge badge--admin" th:text="${review.adminViewHeader}"></span></td>
                    <td th:text="${review.reviewType}"></td>
                    <td th:text="${review.customerName}"></td>
                    <td th:text="${review.serviceName}"></td>
                    <td th:text="${review.stylistName}"></td>
                    <td th:text="${review.rating}"></td>
                    <td th:text="${review.comment}"></td>
                    <td class="actions">
                        <a class="edit-btn" th:href="@{/admin/editReview(id=${review.reviewId})}">Edit</a>
                        <a class="delete-btn"
                           th:href="@{/admin/deleteReview(id=${review.reviewId})}"
                           onclick="return confirm('Delete this review as admin?');">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <a class="view-link" href="/reviews">Back to Customer View</a>
    </div>
</main>

</body>
</html>
