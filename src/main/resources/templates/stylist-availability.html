<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylist Availability | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        .status-available { background-color: #e8f5e9 !important; color: #2e7d32 !important; border: 1px solid #c8e6c9 !important; }
        .status-unavailable { background-color: #fff3e0 !important; color: #ef6c00 !important; border: 1px solid #ffe0b2 !important; }
        
        .form-select-sm {
            border-radius: 8px;
            border-color: #e7c7d2;
            font-size: 0.85rem;
        }

        /* Restored the missing pink badge style for Stylist Level */
        .badge-lumiere {
            background-color: #fcf1f4;
            color: #b37a8c;
            font-weight: 600;
            padding: 0.5em 1em;
            border: 1px solid #f2d7df;
        }
    </style>
</head>

<body class="admin-body py-5"> <div class="container">
    
    <div class="row align-items-center mb-5">
        <div class="col-lg-6 mb-3 mb-lg-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0 text-dark">Stylist Availability</h1>
                    <p class="text-secondary mb-0">Manage today’s team readiness with Lumière precision.</p>
                </div>
            </div>
        </div>
        <div class="col-lg-6 text-lg-end">
            <a th:href="@{/stylists(action='list')}" class="btn btn-lumiere-outline">
                <i class="bi bi-arrow-left me-2"></i>Back to Team Directory
            </a>
        </div>
    </div>

    <div class="card panel">
        <div class="panel-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <h2 class="h5 mb-0"><i class="bi bi-calendar-check me-2"></i>Live Availability Board</h2>
            
            <div class="search-container">
                <div class="input-group" style="min-width: 300px;">
                    <span class="input-group-text bg-transparent border-0 pe-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="statusSearch" class="form-control border-0" placeholder="Filter by name, level, or status...">
                </div>
            </div>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="availabilityTable">
                    <thead>
                    <tr>
                        <th scope="col" class="ps-4">Stylist Name</th>
                        <th scope="col">Specialty</th>
                        <th scope="col">Level</th>
                        <th scope="col">Current Readiness</th>
                        <th scope="col" class="text-end pe-4">Quick Update</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${stylists != null and !stylists.isEmpty()}" th:each="stylist : ${stylists}">
                        <td class="ps-4 fw-bold" th:text="${stylist.name}"></td>
                        <td>
                            <i class="bi bi-stars text-muted me-1 small"></i>
                            <span th:text="${stylist.specialty}"></span>
                        </td>
                        <td>
                            <span class="badge rounded-pill badge-lumiere" th:text="${stylist.level}"></span>
                        </td>
                        <td>
                            <span class="badge rounded-pill px-3" 
                                  th:classappend="${stylist.availabilityStatus == 'Available' ? 'status-available' : 'status-unavailable'}"
                                  th:text="${stylist.availabilityStatus}">
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <form th:action="@{/stylists(action='availability')}" method="post" class="d-inline-flex gap-2 justify-content-end align-items-center">
                                <input type="hidden" name="userId" th:value="${stylist.userId}">
                                <select name="available" class="form-select form-select-sm" 
                                        style="width: 130px;"
                                        th:disabled="${session.staffRole != 'MANAGER'}">
                                    <option th:value="true" th:selected="${stylist.available}">Available</option>
                                    <option th:value="false" th:selected="${!stylist.available}">Unavailable</option>
                                </select>
                                <button type="submit" class="btn btn-lumiere shadow-sm"
                                        th:if="${session.staffRole == 'MANAGER'}" title="Apply Update">
                                    <i class="bi bi-check2"></i> Save
                                </button>
                            </form>
                        </td>
                    </tr>
                    
                    <tr th:if="${stylists == null or stylists.isEmpty()}">
                        <td colspan="5" class="text-center py-5 text-secondary">
                            <i class="bi bi-person-dash display-4 d-block mb-3 opacity-25"></i>
                            <span>No stylists found. Ensure your team is registered in the directory.</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('statusSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#availabilityTable tbody tr");

        rows.forEach(row => {
            let rowText = row.textContent.toLowerCase();
            row.style.display = rowText.includes(filter) ? "" : "none";
        });
    });
</script>

</body>
</html>
