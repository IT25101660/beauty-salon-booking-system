<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Service | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Linked to Master Theme -->
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        /* Restores the specific pink gradient header just for this form */
        .edit-panel-header-override {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            padding: 1.8rem 2rem !important;
            border-bottom: none !important;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        /* Restores your exact readonly styling for the ID box */
        .form-control[readonly] {
            background-color: #fdf4f7 !important;
            color: #8f596c !important;
            border-style: dashed !important;
            font-weight: 700 !important;
        }
    </style>
</head>
<body class="admin-body py-5"> <div class="container">
    
    <div class="row align-items-center mb-5">
        <div class="col-md-7 mb-3 mb-md-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0 text-dark">Edit Service</h1>
                    <p class="text-secondary mb-0">Refine treatment details to perfection.</p>
                </div>
            </div>
        </div>
        <div class="col-md-5 text-md-end">
            <a th:href="@{/services(action='list')}" class="btn btn-lumiere-outline">
                <i class="bi bi-arrow-left me-2"></i>Back to Services
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card panel">
                <!-- Applied the restored pink gradient header -->
                <div class="edit-panel-header-override">
                    <h2 class="h4 mb-0 text-white"><i class="bi bi-pencil-square me-2"></i>Update Service Details</h2>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form method="post" th:action="@{/services}" class="row g-4 needs-validation" novalidate autocomplete="off">
                        <input type="hidden" name="action" value="update">
                        
                        <div class="col-md-5">
                            <label for="serviceId" class="form-label">Service Account ID</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-hash"></i></span>
                                <input type="number" class="form-control" id="serviceId" name="serviceId" required readonly
                                       th:value="${service.serviceId}">
                            </div>
                            <div class="form-text mt-2 small text-muted"><i class="bi bi-info-circle me-1"></i>System ID is permanent.</div>
                        </div>

                        <div class="col-md-7">
                            <label for="type" class="form-label">Classification</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-tag"></i></span>
                                <select class="form-select" id="type" name="type" required>
                                    <option value="standard" th:selected="${typeValue == 'standard'}">Standard Treatment</option>
                                    <option value="package" th:selected="${typeValue == 'package'}">Luxe Bundle / Package</option>
                                </select>
                                <div class="invalid-feedback">Please select a service type.</div>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="name" class="form-label">Service Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-pencil"></i></span>
                                <input type="text" class="form-control" id="name" name="name" required maxlength="200"
                                       th:value="${service.name}">
                                <div class="invalid-feedback">A service name is required.</div>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label">Treatment Description</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-justify-left"></i></span>
                                <textarea class="form-control" id="description" name="description" rows="4" required th:text="${service.description}"></textarea>
                                <div class="invalid-feedback">Please provide a short description.</div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="basePrice" class="form-label">Base Price</label>
                            <div class="input-group shadow-sm" style="border-radius: 10px;">
                                <span class="input-group-text bg-light text-dark fw-bold">LKR</span>
                                <input type="number" class="form-control border-start-0" id="basePrice" name="basePrice"
                                       required min="0" step="0.01"
                                       th:value="${#numbers.formatDecimal(service.basePrice, 1, 'NONE', 2, 'POINT')}">
                                <div class="invalid-feedback">Please enter a valid price.</div>
                            </div>
                        </div>

                        <!-- NEW: Stylist Assignment Dropdown -->
                        <div class="col-md-6">
                            <label for="stylistName" class="form-label">Assigned Specialist</label>
                            <div class="input-group shadow-sm" style="border-radius: 10px;">
                                <span class="input-group-text bg-white" style="border-radius: 10px 0 0 10px !important;"><i class="bi bi-person-badge"></i></span>
                                <select class="form-select border-start-0" id="stylistName" name="stylistName" required style="border-radius: 0 10px 10px 0 !important;">
                                    <option value="" disabled>Choose a specialist...</option>
                                    <option th:each="stylist : ${stylists}"
                                            th:value="${stylist.name}"
                                            th:text="${stylist.name} + ' (' + ${stylist.specialty} + ')'"
                                            th:selected="${service.stylistName == stylist.name}">
                                    </option>
                                </select>
                                <div class="invalid-feedback">Please assign a specialist.</div>
                            </div>
                        </div>

                        <div class="col-12 mt-5 border-top pt-4">
                            <div class="d-flex gap-3 justify-content-end">
                                <a th:href="@{/services(action='list')}" class="btn btn-lumiere-outline">Cancel</a>
                                <button type="submit" class="btn btn-lumiere">
                                    <i class="bi bi-check2-circle me-2"></i>Update Service
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function () {
    'use strict';
    var form = document.querySelector('.needs-validation');
    if (!form) return;
    form.addEventListener('submit', function (e) {
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();
</script>

</body>
</html>
