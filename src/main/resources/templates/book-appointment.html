<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        body.public-booking {
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .booking-panel-header-override {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            padding: 1.8rem 2rem !important;
            text-align: center !important;
            border-bottom: none !important;
        }
    </style>
</head>

<body class="public-booking py-5"> <div class="container">
    <div class="row align-items-center mb-5">
        <div class="col-md-7 mb-3 mb-md-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0 text-dark">New Booking</h1>
                    <p class="text-secondary mb-0">Schedule a premium beauty session for your client.</p>
                </div>
            </div>
        </div>
        <div class="col-md-5 text-md-end">
            <a th:href="@{/appointments(action='list')}" class="btn btn-lumiere-outline">
                <i class="bi bi-calendar3 me-2"></i>View Schedule
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card panel">
                <div class="booking-panel-header-override">
                    <h2 class="h4 mb-0 text-white"><i class="bi bi-pencil-square me-2"></i>Appointment Details</h2>
                </div>
                <div class="card-body p-4 p-md-5">

                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert" style="background-color: #fdf1f4; color: #a62a4b;">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> <strong th:text="${errorMessage}">Stylist Unavailable</strong>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/appointments(action='new')}" method="post" class="needs-validation" novalidate autocomplete="off">
                        <input type="hidden" name="appointmentId" th:value="${generatedAppointmentId}">
                        <div class="mb-4">
                            <label for="customerName" class="form-label">Client Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="customerName" name="customerName" placeholder="Enter client's full name" required autofocus>
                                <div class="invalid-feedback">Please enter a customer name.</div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="serviceDropdown" class="form-label">Select Premium Treatment</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-scissors"></i></span>
                                <select class="form-select" id="serviceDropdown" name="serviceName" required>
                                    <option value="" selected disabled>Choose a service...</option>
                                    <option th:each="srv : ${services}" 
                                            th:value="${srv.name}" 
                                            th:text="${srv.name}"
                                            th:data-stylist="${srv.stylistName}">
                                    </option>
                                </select>
                                <div class="invalid-feedback">Please specify a service.</div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="stylistDropdown" class="form-label">Assigned Specialist</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <select class="form-select" id="stylistDropdown" name="stylistName" required>
                                    <option value="" selected disabled>Select your stylist...</option>
                                    <option th:each="stylist : ${stylists}" 
                                            th:value="${stylist.name}" 
                                            th:text="${stylist.name} + ' (' + ${stylist.specialty} + ')'"
                                            th:if="${stylist.available}">
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="row g-4 mb-5">
                            <div class="col-md-6">
                                <label for="appointmentDate" class="form-label">Preferred Date</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                    <input type="date" class="form-control" id="appointmentDate" name="appointmentDate" required th:attr="min=${#dates.format(#dates.createNow(),'yyyy-MM-dd')}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="appointmentTime" class="form-label">Preferred Time</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-clock"></i></span>
                                    <input type="time" class="form-control" id="appointmentTime" name="appointmentTime" required>
                                </div>
                            </div>
                        </div>
                        <div class="d-grid gap-3 pt-3">
                            <button type="submit" class="btn btn-lumiere btn-lg shadow-sm">
                                <i class="bi bi-check2-circle me-2"></i>Confirm Appointment
                            </button>
                            <a th:href="@{/appointments(action='list')}" class="btn btn-lumiere-outline text-center">Cancel & Return</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// -------------------------------------------------------------
// Smart Auto-Select Logic
// -------------------------------------------------------------
const serviceSelect = document.getElementById('serviceDropdown');
const stylistSelect = document.getElementById('stylistDropdown');

if (serviceSelect && stylistSelect) {
    serviceSelect.addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const assignedStylist = selectedOption.getAttribute('data-stylist');

        if (assignedStylist) {
            for (let i = 0; i < stylistSelect.options.length; i++) {
                if (stylistSelect.options[i].value === assignedStylist) {
                    stylistSelect.selectedIndex = i;
                    break;
                }
            }
        }
    });
}

// -------------------------------------------------------------
// Comprehensive Time & Business Hours Validation
// -------------------------------------------------------------
const dateInput = document.getElementById('appointmentDate');
const timeInput = document.getElementById('appointmentTime');

function validateDateTime() {
    if (!dateInput.value) return;

    // Parse date carefully to avoid timezone shifting
    const dateParts = dateInput.value.split('-');
    const selectedDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
    const dayOfWeek = selectedDate.getDay(); // 0 = Sunday, 6 = Saturday

    // 1. Check for Sundays
    if (dayOfWeek === 0) {
        alert('Lumière Salon is closed on Sundays. Please select another day.');
        dateInput.value = '';
        timeInput.value = '';
        return;
    }

    if (!timeInput.value) return;

    const selectedTime = timeInput.value;
    
    // 2. Check Business Hours
    const minTime = '09:00';
    const maxTime = (dayOfWeek === 6) ? '18:00' : '20:00'; // Sat closes at 6 PM, others at 8 PM

    if (selectedTime < minTime) {
        alert('The salon opens at 9:00 AM. Please select a later time.');
        timeInput.value = '';
        return;
    }

    if (selectedTime > maxTime) {
        const closeTimeText = (dayOfWeek === 6) ? '6:00 PM' : '8:00 PM';
        alert(`The salon closes at ${closeTimeText} on this day. Please select an earlier time.`);
        timeInput.value = '';
        return;
    }

    // 3. Check for Past Times (if today)
    const now = new Date();
    const todayStr = now.getFullYear() + '-' + 
                     String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                     String(now.getDate()).padStart(2, '0');

    if (dateInput.value === todayStr) {
        const currentHours = String(now.getHours()).padStart(2, '0');
        const currentMinutes = String(now.getMinutes()).padStart(2, '0');
        const currentTime = currentHours + ':' + currentMinutes;

        if (selectedTime < currentTime) {
            alert('You cannot select a time that has already passed today. Please select a valid time.');
            timeInput.value = '';
        }
    }
}

if (dateInput && timeInput) {
    dateInput.addEventListener('change', validateDateTime);
    timeInput.addEventListener('change', validateDateTime);
}

// -------------------------------------------------------------
// Bootstrap Validation Logic
// -------------------------------------------------------------
(function () {
    'use strict';
    var form = document.querySelector('.needs-validation');
    if (!form) return;
    form.addEventListener('submit', function (e) {
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();
</script>
</body>
</html>
