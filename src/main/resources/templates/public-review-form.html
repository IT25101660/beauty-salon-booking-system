<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Experience | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        body.public-booking {
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Restores the specific pink gradient header just for this public form */
        .review-panel-header-override {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            padding: 2rem !important;
            text-align: center !important;
            border-bottom: none !important;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        /* Guarantees the locked field looks exactly like the original */
        .locked-field {
            background-color: #fcf1f4 !important; 
            font-weight: 700 !important; 
            color: #8f596c !important;
            border-style: dashed !important;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="public-booking py-5"> <div class="container py-5">
    
    <div class="text-center mb-4">
        <div class="logo-circle mx-auto">L</div>
        <h1 class="h2 mb-1 mt-3">Share Your Experience</h1>
        <p class="text-secondary mb-0">Your feedback helps us perfect the Lumière experience.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card panel">
                <div class="review-panel-header-override">
                    <h2 class="h4 mb-0 text-white"><i class="bi bi-chat-heart me-2"></i>My Feedback</h2>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/submitPublicReview}" method="post" class="needs-validation" novalidate autocomplete="off">
                        
                        <div class="mb-4">
                            <label for="customerName" class="form-label">Client Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="customerName" name="customerName" class="form-control locked-field" th:value="${customerName}" readonly>
                            </div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="serviceName" class="form-label">Service Received</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-scissors"></i></span>
                                    <select id="serviceName" name="serviceName" class="form-select" required>
                                        <option value="" disabled selected>Select service...</option>
                                        <option th:each="srv : ${services}" 
                                                th:value="${srv.name}" 
                                                th:text="${srv.name}">
                                        </option>
                                    </select>
                                    <div class="invalid-feedback">Please select the service you received.</div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="stylistName" class="form-label">Stylist Name (Optional)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-heart"></i></span>
                                    <input type="text" id="stylistName" name="stylistName" class="form-control" placeholder="e.g., Kasun">
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="rating" class="form-label">Overall Rating</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-star"></i></span>
                                <select id="rating" name="rating" class="form-select" required>
                                    <option value="5">★★★★★ - Excellent (Highly Recommend)</option>
                                    <option value="4">★★★★☆ - Good (Very Satisfied)</option>
                                    <option value="3">★★★☆☆ - Average (Satisfied)</option>
                                    <option value="2">★★☆☆☆ - Poor (Needs Improvement)</option>
                                    <option value="1">★☆☆☆☆ - Very Poor (Disappointed)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="comment" class="form-label">Your Review</label>
                            <div class="input-group">
                                <span class="input-group-text" style="border-radius: 10px 0 0 10px !important;"><i class="bi bi-chat-left-text"></i></span>
                                <textarea id="comment" name="comment" class="form-control" rows="4" 
                                          placeholder="Tell us about your visit and what you loved..." required 
                                          style="border-radius: 0 10px 10px 0 !important;"></textarea>
                                <div class="invalid-feedback">We would love to hear your thoughts.</div>
                            </div>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-3 pt-3">
                            <button type="submit" class="btn btn-lumiere btn-lg flex-grow-1 shadow-sm">
                                <i class="bi bi-check2-circle me-2"></i>Submit My Review
                            </button>
                            <a th:href="@{/my-portal}" class="btn btn-lumiere-outline btn-lg text-center">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function () {
    'use strict';
    var form = document.querySelector('.needs-validation');
    if (!form) return;
    form.addEventListener('submit', function (e) {
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();
</script>

</body>
</html>
