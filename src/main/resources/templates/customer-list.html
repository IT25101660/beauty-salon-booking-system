<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        .badge-lumiere {
            background-color: #fcf1f4;
            color: #b37a8c;
            font-weight: 600;
            padding: 0.5em 1em;
            border: 1px solid #f2d7df;
        }
    </style>
</head>

<body class="admin-body py-5"> <div class="container">
    
    <div class="row align-items-center mb-5">
        <div class="col-lg-6 mb-3 mb-lg-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0">Customer Directory</h1>
                    <p class="text-secondary mb-0">Manage and oversee all Lumière salon clients.</p>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="d-flex flex-wrap gap-2 justify-content-lg-end">
                <a th:href="@{/admin}" class="btn btn-lumiere-outline">
                    <i class="bi bi-arrow-left me-2"></i>Dashboard
                </a>
                <a th:if="${session.staffRole == 'MANAGER'}"
                   th:href="@{/customers(action='register')}" class="btn btn-lumiere">
                    <i class="bi bi-plus-lg me-2"></i>New Customer
                </a>
            </div>
        </div>
    </div>

    <div class="card panel">
        <div class="panel-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <h2 class="h5 mb-0"><i class="bi bi-people me-2"></i>Active Clients</h2>
            
            <div class="search-container">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 pe-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="customerSearch" class="form-control border-0" placeholder="Search by name, email or type...">
                </div>
            </div>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="customerTable">
                    <thead>
                    <tr>
                        <th scope="col" style="width: 80px;" class="ps-4">ID</th>
                        <th scope="col">Name</th>
                        <th scope="col">Email Address</th>
                        <th scope="col">Status</th>
                        <th scope="col">System Message</th>
                        <th scope="col" class="text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${customers != null and !customers.isEmpty()}" th:each="customer : ${customers}">
                        <td class="text-muted ps-4 small" th:text="${customer.userId}"></td>
                        <td>
                            <div class="fw-bold" th:text="${customer.name}"></div>
                        </td>
                        <td th:text="${customer.email}"></td>
                        <td>
                            <span class="badge rounded-pill badge-lumiere" th:text="${customer.customerType}"></span>
                        </td>
                        <td class="small italic text-muted" th:text="${customer.welcomeMessage}"></td>
                        <td class="text-end pe-4">
                            <div th:if="${session.staffRole == 'MANAGER'}" class="btn-group">
                                <a th:href="@{/customers(action='update', userId=${customer.userId})}" 
                                   class="btn btn-sm btn-outline-secondary border-0 rounded-circle me-1" title="Edit Profile">
                                    <i class="bi bi-pencil-square fs-5"></i>
                                </a>
                                <a th:href="@{/customers(action='delete', userId=${customer.userId})}" 
                                   class="btn btn-sm btn-outline-danger border-0 rounded-circle" 
                                   title="Delete Customer"
                                   onclick="return confirm('Delete this customer permanently?');">
                                    <i class="bi bi-trash3 fs-5"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    
                    <tr th:if="${customers == null or customers.isEmpty()}">
                        <td colspan="6" class="text-center py-5">
                            <i class="bi bi-person-slash display-4 text-muted mb-3 d-block opacity-25"></i>
                            <p class="text-secondary fs-5 mb-0">No customers registered in the system yet.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('customerSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#customerTable tbody tr");

        rows.forEach(row => {
            // Check Name, Email, and Type columns for a match
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    });
</script>
</body>
</html>
